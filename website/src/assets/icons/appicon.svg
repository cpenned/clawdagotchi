<svg
  width="80"
  height="80"
  viewBox="0 0 100 100"
  fill="none"
  xmlns="http://www.w3.org/2000/svg"
  class="mx-auto rounded-2xl"
  style="box-shadow: 0 8px 32px rgba(217,119,87,0.3)"
>
  <!-- Salmon bg -->
  <rect width="100" height="100" rx="22" fill="#D97757"></rect>
  <!-- Light egg -->
  <ellipse cx="50" cy="48" rx="34" ry="40" fill="#F8D0C4"></ellipse>
  <!-- Crab body (scaled from 66x52 viewBox) -->
  <rect x="32" y="28" width="36" height="26" fill="#D97757"></rect>
  <!-- Antennae -->
  <rect x="26" y="34" width="4" height="8" fill="#D97757"></rect>
  <rect x="70" y="34" width="4" height="8" fill="#D97757"></rect>
  <!-- Legs -->
  <rect x="32" y="54" width="4" height="8" fill="#D97757"></rect>
  <rect x="40" y="54" width="4" height="8" fill="#D97757"></rect>
  <rect x="56" y="54" width="4" height="8" fill="#D97757"></rect>
  <rect x="64" y="54" width="4" height="8" fill="#D97757"></rect>
  <!-- Eyes (cutout) -->
  <rect x="38" y="34" width="5" height="5" fill="#F8D0C4"></rect>
  <rect x="57" y="34" width="5" height="5" fill="#F8D0C4"></rect>
  <!-- Buttons -->
  <circle cx="41" cy="80" r="3.5" fill="#D97757"></circle>
  <circle cx="50" cy="80" r="3.5" fill="#D97757"></circle>
  <circle cx="59" cy="80" r="3.5" fill="#D97757"></circle>
</svg>